services:
  db:
    image: postgres:16-alpine
    container_name: memo-postgres
    environment:
      POSTGRES_USER: memo
      POSTGRES_PASSWORD: memo
      POSTGRES_DB: memo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memo -d memo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: memo-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./backend
    container_name: memo-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://memo:memo@db:5432/memo_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 🚀여기에 프론트엔드 서비스를 새로 추가합니다!
  frontend:
    build: ./frontend
    container_name: memo-web
    ports:
      - "5173:5173"  # 외부의 5173 신호를 컨테이너 안의 5173으로 연결
    command: npm run dev  # package.json에 적어둔 "vite --host 0.0.0.0"을 강제 실행
    depends_on:
      - app          # 백엔드가 먼저 켜진 뒤에 프론트엔드가 켜지도록 보장

volumes:
  postgres_data: